
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talhiana 💖</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="rosa">

<div class="anime-bg"></div>
<div class="floating-character left">
    <img src="./assets/nanami3.png" alt="nanami">
</div>

<div class="floating-character center">
    <img src="./assets/obito2.png" alt="Obito">
</div>

<div class="floating-character right">
    <img src="./assets/zoro1.png" alt="zoro">
</div>

<div class="phone-app">
  <header>
    <h1>💖 Talhiana</h1>
    <p id="mensajeRomantico">✨ Cargando mensaje...</p>
  </header>

  <section class="card">
    <h3>👤 Bienvenida</h3>
    <input type="text" id="nombreUsuario" placeholder="Escribe tu nombre">
    <button onclick="guardarNombre()">Guardar nombre</button>
  </section>

  <section class="card">
    <h3>🎨 Temas personalizados</h3>
    <select id="tema" onchange="cambiarTema()">
      <option value="rosa">💖 Rosa</option>
      <option value="morado">💜 Morado</option>
      <option value="oscuro">🌙 Oscuro</option>
      <option value="cielo">☁️ Cielo</option>
    </select>
  </section>

  <section class="card">
    <h3>📅 Rutina diaria</h3>
    <input type="time" id="hora">
    <input type="text" id="actividad" placeholder="Actividad">
    <select id="tipo">
      <option>📚 Estudio</option>
      <option>🏀 Deporte</option>
      <option>🍽️ Comida</option>
      <option>😴 Descanso</option>
      <option>💄 Personal</option>
      <option>💕 Especial</option>
    </select>
    <button onclick="agregarRutina()">Agregar rutina</button>
    <ul id="listaRutina"></ul>
  </section>

  <section class="card">
    <h3>🔔 Alarmas</h3>
    <input type="time" id="horaAlarma">
    <button onclick="activarAlarma()">Activar alarma</button>
  </section>

  <section class="card">
    <h3>🎵 Música relajante</h3>
    <button onclick="playMusic()">▶️ Reproducir</button>
    <button onclick="pauseMusic()">⏸️ Pausar</button>
  </section>

  <section class="card extra-love">
    <h3>💌 Modo Te Extraño</h3>
    <button onclick="mostrarMensajeEspecial()">Ver mensaje bonito</button>
    <p id="mensajeEspecial"></p>
  </section>
</div>

<audio id="musica" src="music.mp3" loop></audio>

<script src="script.js"></script>
</body>
</html>
